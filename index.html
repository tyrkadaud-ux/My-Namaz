    <script>
        // Функция для анимации счётчиков
        function animateCounter(id, target) {
            let current = 0;
            let step = Math.ceil(target / 100);
            let el = document.getElementById(id);
            if (!el) return;
            let timer = setInterval(() => {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                el.textContent = current;
            }, 20);
        }

        // Запуск анимации после загрузки страницы
        window.onload = function() {
            animateCounter('hectares', 1200);
            animateCounter('tons', 850);
            animateCounter('partners', 24);
        };

        // Плавный скролл по якорям
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({
                        top: target.offsetTop - 80,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Функции для выбора пакета и метода оплаты (они уже были в коде)
        function selectTier(element, amount) {
            document.querySelectorAll('.donation-tier').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.querySelector('.donation-section .btn-primary').innerHTML = `<i class="fas fa-seedling"></i> Купить ${amount.toLocaleString('ru-RU')} GHEMP`;
        }
        function selectPayment(method) {
            document.querySelectorAll('.payment-btn').forEach(b => b.style.opacity = '0.7');
            event.target.style.opacity = '1';
        }
        function toggleFAQ(el) {
            el.classList.toggle('active');
        }
    </script>
</body>
