name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet pyinstaller requests
      - name: Build APK with Flet
        run: |
          yes | flet build apk --verbose
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-namaz-apk
          path: build/apk/debug/*.apk
